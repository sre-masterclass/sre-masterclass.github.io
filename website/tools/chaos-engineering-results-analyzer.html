<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Masterclass: Chaos Engineering Results Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .chart-container {
            height: 300px;
            margin-bottom: 20px;
        }

        #controls {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chaos Engineering Results Analyzer</h1>
            <p>Interactive chaos experiment result analysis</p>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>System Behavior During Chaos</h2>
                <div class="chart-container">
                    <canvas id="systemBehaviorChart"></canvas>
                </div>
            </div>
            <div class="panel">
                <h2>Recovery Pattern</h2>
                <div class="chart-container">
                    <canvas id="recoveryPatternChart"></canvas>
                </div>
            </div>
        </div>
        <div id="controls" style="text-align: center; padding-bottom: 30px;">
            <button id="run-experiment-btn">Run Chaos Experiment</button>
        </div>
    </div>

    <script>
        const systemBehaviorCtx = document.getElementById('systemBehaviorChart').getContext('2d');
        const recoveryPatternCtx = document.getElementById('recoveryPatternChart').getContext('2d');
        const runExperimentBtn = document.getElementById('run-experiment-btn');

        let systemBehaviorChart, recoveryPatternChart;

        function runExperiment() {
            const labels = Array.from({ length: 120 }, (_, i) => `T-${120 - i}`);
            // Simulate a dip in performance during the chaos experiment
            const systemBehaviorData = Array.from({ length: 120 }, (_, i) => {
                if (i > 40 && i < 80) {
                    return 20 + Math.random() * 10; // Chaos period
                }
                return 90 + Math.random() * 10; // Normal operation
            });
            
            // Simulate recovery time
            const recoveryPatternData = Array.from({ length: 120 }, (_, i) => {
                 if (i < 80) return null;
                 const recovery = (i - 80) / 40 * 100;
                 return Math.min(100, recovery);
            });

            if (systemBehaviorChart) systemBehaviorChart.destroy();
            systemBehaviorChart = new Chart(systemBehaviorCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'System Performance',
                        data: systemBehaviorData,
                        borderColor: 'orange',
                        fill: false
                    }]
                }
            });

            if (recoveryPatternChart) recoveryPatternChart.destroy();
            recoveryPatternChart = new Chart(recoveryPatternCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Recovery %',
                        data: recoveryPatternData,
                        borderColor: 'green',
                        fill: false
                    }]
                },
                options: {
                    scales: {
                        y: {
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }

        runExperimentBtn.addEventListener('click', runExperiment);
        runExperiment(); // Initial run
    </script>
</body>
</html>
