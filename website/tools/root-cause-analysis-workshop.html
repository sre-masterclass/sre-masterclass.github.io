<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Masterclass: Root Cause Analysis Workshop</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .chart-container {
            height: 300px;
            margin-bottom: 20px;
        }

        #hypothesis-testing {
            margin-top: 20px;
        }

        #hypothesis-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        #evidence {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Root Cause Analysis Workshop</h1>
            <p>Systematic root cause investigation simulator</p>
        </div>

        <div class="main-content">
            <div class="panel" id="metrics-panel">
                <h2>Metrics</h2>
                <div class="chart-container">
                    <canvas id="cpuChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                </div>
            </div>
            <div class="panel" id="logs-panel">
                <h2>Logs</h2>
                <pre id="log-data" style="background: #2c3e50; color: white; padding: 10px; height: 300px; overflow-y: scroll;"></pre>
                <div id="hypothesis-testing">
                    <h2>Hypothesis Testing</h2>
                    <input type="text" id="hypothesis-input" placeholder="Enter your hypothesis...">
                    <button id="test-hypothesis-btn">Test Hypothesis</button>
                    <div id="evidence">
                        <h3>Evidence</h3>
                        <p id="evidence-text">No evidence yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cpuCtx = document.getElementById('cpuChart').getContext('2d');
        const memoryCtx = document.getElementById('memoryChart').getContext('2d');
        const logDataEl = document.getElementById('log-data');
        const hypothesisInput = document.getElementById('hypothesis-input');
        const testHypothesisBtn = document.getElementById('test-hypothesis-btn');
        const evidenceText = document.getElementById('evidence-text');

        // Generate sample data
        const labels = Array.from({ length: 60 }, (_, i) => `T-${60 - i}`);
        const cpuData = Array.from({ length: 60 }, (_, i) => i < 30 ? 20 + Math.random() * 10 : 80 + Math.random() * 10);
        const memoryData = Array.from({ length: 60 }, (_, i) => i < 30 ? 40 + Math.random() * 10 : 90 + Math.random() * 10);
        const logs = [
            "INFO: Service started",
            "INFO: User logged in",
            "ERROR: OutOfMemoryError: Java heap space",
            "INFO: User checkout failed",
            "WARN: High CPU usage detected"
        ];

        // Render charts
        new Chart(cpuCtx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'CPU Usage (%)', data: cpuData, borderColor: 'red', fill: false }] }
        });
        new Chart(memoryCtx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'Memory Usage (%)', data: memoryData, borderColor: 'blue', fill: false }] }
        });

        // Render logs
        logDataEl.textContent = logs.join('\n');

        // Hypothesis testing
        testHypothesisBtn.addEventListener('click', () => {
            const hypothesis = hypothesisInput.value.toLowerCase();
            if (hypothesis.includes('memory') || hypothesis.includes('oom')) {
                evidenceText.textContent = "Evidence found: Logs show 'OutOfMemoryError' and memory usage is high.";
            } else if (hypothesis.includes('cpu')) {
                evidenceText.textContent = "Evidence found: CPU usage is high.";
            } else {
                evidenceText.textContent = "No direct evidence found for this hypothesis.";
            }
        });
    </script>
</body>
</html>
