<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarterly CEO Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .metric { text-align: center; margin: 20px 0; }
        .metric .value { font-size: 48px; font-weight: bold; color: #27ae60; }
        .metric .label { font-size: 18px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quarterly CEO Dashboard</h1>
        <div class="metric">
            <div class="value">$2.3M</div>
            <div class="label">Revenue Protected This Quarter</div>
        </div>
        <div class="metric">
            <div class="value">15%</div>
            <div class="label">Improvement in Customer Satisfaction</div>
        </div>
        <div class="metric">
            <div class="value">99.95%</div>
            <div class="label">Uptime vs 99.8% Industry Average</div>
        </div>
    </div>
</body>
</html>
