<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded SRE Model (Spotify-style)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 1000px;
        }
        h1 {
            text-align: center;
            color: #005f73;
            margin-bottom: 10px;
        }
        h2 {
            text-align: center;
            color: #0a9396;
            margin-bottom: 30px;
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Embedded SRE Model</h1>
        <h2>(Spotify-style)</h2>
        <svg viewBox="0 0 800 400">
            <defs>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="2" dy="2" result="offsetblur"/>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.5"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Squad A -->
            <g transform="translate(50, 50)">
                <rect x="0" y="0" width="200" height="120" rx="10" fill="#fff" stroke="#94d2bd" stroke-width="2" filter="url(#shadow)"/>
                <text x="100" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#005f73">Squad A (Music Discovery)</text>
                <rect x="20" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="55" y="85" text-anchor="middle">Dev</text>
                <rect x="110" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="145" y="85" text-anchor="middle">Dev</text>
                <rect x="65" y="130" width="70" height="40" rx="5" fill="#e9d8a6"/>
                <text x="100" y="155" text-anchor="middle" font-weight="bold">SRE</text>
                <line x1="100" y1="100" x2="100" y2="130" stroke="#333" stroke-dasharray="4 2"/>
            </g>

            <!-- Squad B -->
            <g transform="translate(300, 50)">
                <rect x="0" y="0" width="200" height="120" rx="10" fill="#fff" stroke="#94d2bd" stroke-width="2" filter="url(#shadow)"/>
                <text x="100" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#005f73">Squad B (Payments)</text>
                <rect x="20" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="55" y="85" text-anchor="middle">Dev</text>
                <rect x="110" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="145" y="85" text-anchor="middle">Dev</text>
                <rect x="65" y="130" width="70" height="40" rx="5" fill="#e9d8a6"/>
                <text x="100" y="155" text-anchor="middle" font-weight="bold">SRE</text>
                <line x1="100" y1="100" x2="100" y2="130" stroke="#333" stroke-dasharray="4 2"/>
            </g>

            <!-- Squad C -->
            <g transform="translate(550, 50)">
                <rect x="0" y="0" width="200" height="120" rx="10" fill="#fff" stroke="#94d2bd" stroke-width="2" filter="url(#shadow)"/>
                <text x="100" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#005f73">Squad C (Podcasts)</text>
                <rect x="20" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="55" y="85" text-anchor="middle">Dev</text>
                <rect x="110" y="60" width="70" height="40" rx="5" fill="#94d2bd"/>
                <text x="145" y="85" text-anchor="middle">Dev</text>
                <rect x="65" y="130" width="70" height="40" rx="5" fill="#e9d8a6"/>
                <text x="100" y="155" text-anchor="middle" font-weight="bold">SRE</text>
                <line x1="100" y1="100" x2="100" y2="130" stroke="#333" stroke-dasharray="4 2"/>
            </g>

            <text x="400" y="300" text-anchor="middle" font-size="16" font-style="italic">
                Each autonomous squad has dedicated SRE expertise, ensuring deep product intimacy and fast response times.
            </text>
        </svg>
    </div>
</body>
</html>
