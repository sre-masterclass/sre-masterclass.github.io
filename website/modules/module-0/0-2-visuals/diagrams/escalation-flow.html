<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Response Escalation Flow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 1200px;
        }
        h1 {
            text-align: center;
            color: #005f73;
            margin-bottom: 30px;
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Incident Response Escalation Flow</h1>
        <svg viewBox="0 0 1000 600">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
                </marker>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="2" dy="2" result="offsetblur"/>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.5"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Tiers -->
            <g class="tier" transform="translate(50, 50)">
                <rect x="0" y="0" width="900" height="150" rx="10" fill="#fff" stroke="#94d2bd" stroke-width="2" filter="url(#shadow)"/>
                <text x="20" y="30" font-size="24" font-weight="bold" fill="#005f73">Tier 1: Product Team On-call</text>
                <text x="880" y="30" text-anchor="end" font-size="18" font-weight="bold" fill="#005f73">Target: 5-15 mins</text>
                <text x="40" y="70" font-size="16">- Initial incident detection & basic troubleshooting</text>
                <text x="40" y="95" font-size="16">- Service-specific knowledge and immediate response</text>
                <text x="40" y="120" font-size="16">- Authority to implement standard fixes</text>
            </g>

            <g class="tier" transform="translate(50, 225)">
                <rect x="0" y="0" width="900" height="150" rx="10" fill="#fff" stroke="#ee9b00" stroke-width="2" filter="url(#shadow)"/>
                <text x="20" y="30" font-size="24" font-weight="bold" fill="#ca6702">Tier 2: SRE Team Escalation</text>
                <text x="880" y="30" text-anchor="end" font-size="18" font-weight="bold" fill="#ca6702">Target: 15-30 mins</text>
                <text x="40" y="70" font-size="16">- Complex troubleshooting & cross-service coordination</text>
                <text x="40" y="95" font-size="16">- Infrastructure-level diagnosis & advanced automation</text>
                <text x="40" y="120" font-size="16">- Authority to make architectural decisions</text>
            </g>

            <g class="tier" transform="translate(50, 400)">
                <rect x="0" y="0" width="900" height="150" rx="10" fill="#fff" stroke="#ae2012" stroke-width="2" filter="url(#shadow)"/>
                <text x="20" y="30" font-size="24" font-weight="bold" fill="#ae2012">Tier 3: Engineering Management</text>
                <text x="880" y="30" text-anchor="end" font-size="18" font-weight="bold" fill="#ae2012">Target: 30+ mins</text>
                <text x="40" y="70" font-size="16">- Customer communication & business impact decisions</text>
                <text x="40" y="95" font-size="16">- External vendor coordination & resource allocation</text>
                <text x="40" y="120" font-size="16">- Executive briefing & long-term strategic response</text>
            </g>

            <!-- Arrows -->
            <line x1="500" y1="200" x2="500" y2="225" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
            <text x="520" y="218" font-size="14" font-weight="bold">ESCALATE</text>
            <line x1="500" y1="375" x2="500" y2="400" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
            <text x="520" y="393" font-size="14" font-weight="bold">ESCALATE</text>

        </svg>
    </div>
</body>
</html>
