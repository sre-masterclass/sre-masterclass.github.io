<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Organizational Model Comparison</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 1600px;
        }
        .model {
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .model h2 {
            font-size: 1.5em;
            color: #005f73;
            margin-bottom: 10px;
        }
        .model h3 {
            font-size: 1.1em;
            color: #0a9396;
            margin-bottom: 20px;
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="model">
            <h2>Embedded SRE</h2>
            <h3>(Spotify Model)</h3>
            <svg viewBox="0 0 400 300">
                <rect x="150" y="20" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="200" y="45" text-anchor="middle">Product A</text>
                <rect x="175" y="80" width="50" height="30" rx="5" fill="#e9d8a6" />
                <text x="200" y="100" text-anchor="middle">SRE</text>
                <line x1="200" y1="60" x2="200" y2="80" stroke="#333" />

                <rect x="50" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="100" y="175" text-anchor="middle">Product B</text>
                <rect x="75" y="210" width="50" height="30" rx="5" fill="#e9d8a6" />
                <text x="100" y="230" text-anchor="middle">SRE</text>
                <line x1="100" y1="190" x2="100" y2="210" stroke="#333" />

                <rect x="250" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="300" y="175" text-anchor="middle">Product C</text>
                <rect x="275" y="210" width="50" height="30" rx="5" fill="#e9d8a6" />
                <text x="300" y="230" text-anchor="middle">SRE</text>
                <line x1="300" y1="190" x2="300" y2="210" stroke="#333" />
            </svg>
        </div>
        <div class="model">
            <h2>Centralized SRE</h2>
            <h3>(Netflix Model)</h3>
            <svg viewBox="0 0 400 300">
                <rect x="150" y="20" width="100" height="40" rx="5" fill="#ee9b00" />
                <text x="200" y="45" text-anchor="middle">Platform SRE</text>
                
                <rect x="20" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="70" y="175" text-anchor="middle">Product A</text>
                <rect x="150" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="200" y="175" text-anchor="middle">Product B</text>
                <rect x="280" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="330" y="175" text-anchor="middle">Product C</text>

                <line x1="200" y1="60" x2="200" y2="120" stroke="#333" />
                <line x1="70" y1="120" x2="330" y2="120" stroke="#333" />
                <line x1="70" y1="120" x2="70" y2="150" stroke="#333" />
                <line x1="200" y1="120" x2="200" y2="150" stroke="#333" />
                <line x1="330" y1="120" x2="330" y2="150" stroke="#333" />
            </svg>
        </div>
        <div class="model">
            <h2>Hybrid SRE</h2>
            <h3>(Google Model)</h3>
            <svg viewBox="0 0 400 300">
                <rect x="150" y="20" width="100" height="40" rx="5" fill="#ee9b00" />
                <text x="200" y="45" text-anchor="middle">Platform SRE</text>

                <rect x="50" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="100" y="175" text-anchor="middle">Product A</text>
                <rect x="75" y="210" width="50" height="30" rx="5" fill="#e9d8a6" />
                <text x="100" y="230" text-anchor="middle">SRE</text>
                <line x1="100" y1="190" x2="100" y2="210" stroke="#333" />

                <rect x="250" y="150" width="100" height="40" rx="5" fill="#94d2bd" />
                <text x="300" y="175" text-anchor="middle">Product B</text>
                <rect x="275" y="210" width="50" height="30" rx="5" fill="#e9d8a6" />
                <text x="300" y="230" text-anchor="middle">SRE</text>
                <line x1="300" y1="190" x2="300" y2="210" stroke="#333" />

                <path d="M 200 60 V 100 C 200 110, 100 110, 100 120 V 150" fill="none" stroke="#333" />
                <path d="M 200 60 V 100 C 200 110, 300 110, 300 120 V 150" fill="none" stroke="#333" />
            </svg>
        </div>
    </div>
</body>
</html>
