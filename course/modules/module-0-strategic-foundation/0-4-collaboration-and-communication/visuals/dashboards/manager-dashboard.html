<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Manager Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .metric { text-align: center; margin: 20px 0; }
        .metric .value { font-size: 48px; font-weight: bold; color: #8e44ad; }
        .metric .label { font-size: 18px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weekly Manager Dashboard</h1>
        <div class="metric">
            <div class="value">30%</div>
            <div class="label">Faster Incident Resolution</div>
        </div>
        <div class="metric">
            <div class="value">5</div>
            <div class="label">Engineers Completed SRE Certification</div>
        </div>
        <div class="metric">
            <div class="value">20 hrs/wk</div>
            <div class="label">Manual Work Reduced by New Automation</div>
        </div>
    </div>
</body>
</html>
