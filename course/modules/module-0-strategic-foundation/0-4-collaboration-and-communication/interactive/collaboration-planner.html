<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizational Collaboration Planner</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .tool-section { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; padding: 20px; background-color: #fdfdfd; }
        .tool-section h2 { margin-top: 0; color: #34495e; border-bottom: 2px solid #9b59b6; padding-bottom: 10px; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #9b59b6; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Organizational Collaboration Planner</h1>

        <div class="tool-section">
            <h2>Stakeholder Mapping</h2>
            <textarea placeholder="Enter stakeholder names, roles, and interests..."></textarea>
            <button>Generate Map</button>
        </div>

        <div class="tool-section">
            <h2>Culture Maturity Assessment</h2>
            <p>Assess your organization's current culture maturity stage.</p>
            <button>Start Assessment</button>
        </div>

        <div class="tool-section">
            <h2>Collaboration Pattern Designer</h2>
            <textarea placeholder="Design communication and collaboration workflows..."></textarea>
            <button>Save Pattern</button>
        </div>

        <div class="tool-section">
            <h2>Executive Engagement Strategy</h2>
            <textarea placeholder="Develop value propositions and communication plans for executives..."></textarea>
            <button>Create Strategy</button>
        </div>

        <div class="tool-section">
            <h2>Scaling Implementation Planner</h2>
            <textarea placeholder="Outline timeline, resource requirements, and risks..."></textarea>
            <button>Generate Plan</button>
        </div>
    </div>
</body>
</html>
