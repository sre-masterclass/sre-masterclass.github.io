<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture Development Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .tool-section { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; padding: 20px; background-color: #fdfdfd; }
        .tool-section h2 { margin-top: 0; color: #34495e; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #f1c40f; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Culture Development Tracker</h1>

        <div class="tool-section">
            <h2>Four-Stage Culture Development Assessment</h2>
            <p>Select your organization's current stage:</p>
            <select>
                <option>Stage 1: Awareness Building</option>
                <option>Stage 2: Practice Adoption</option>
                <option>Stage 3: Cultural Integration</option>
                <option>Stage 4: Continuous Evolution</option>
            </select>
            <button>View Next Steps</button>
        </div>

        <div class="tool-section">
            <h2>Leadership Behavior Modeling Tracker</h2>
            <textarea placeholder="Track specific leadership actions and their impact..."></textarea>
            <button>Log Action</button>
        </div>

        <div class="tool-section">
            <h2>Communication Rhythm Designer</h2>
            <textarea placeholder="Design weekly, monthly, and quarterly communication patterns..."></textarea>
            <button>Save Rhythm</button>
        </div>

        <div class="tool-section">
            <h2>Recognition System Builder</h2>
            <textarea placeholder="Create and track reliability hero programs and awards..."></textarea>
            <button>Design Program</button>
        </div>
    </div>
</body>
</html>
