<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Cross-Functional Workflows</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 1400px;
        }
        h1 {
            text-align: center;
            color: #005f73;
            margin-bottom: 30px;
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SRE Cross-Functional Workflows</h1>
        <svg viewBox="0 0 1200 700">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
                </marker>
                 <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="2" dy="2" result="offsetblur"/>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.5"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- SRE Team -->
            <g transform="translate(450, 300)">
                <circle cx="150" cy="50" r="100" fill="#ee9b00" filter="url(#shadow)"/>
                <text x="150" y="55" text-anchor="middle" font-size="32" font-weight="bold" fill="white">SRE</text>
            </g>

            <!-- Other Teams -->
            <g transform="translate(450, 50)">
                <rect x="0" y="0" width="300" height="100" rx="10" fill="#94d2bd" filter="url(#shadow)"/>
                <text x="150" y="30" text-anchor="middle" font-size="22" font-weight="bold">Product Management</text>
                <text x="150" y="60" text-anchor="middle">- Reliability Requirements</text>
                <text x="150" y="80" text-anchor="middle">- Error Budget Policies</text>
            </g>
            <g transform="translate(50, 275)">
                <rect x="0" y="0" width="300" height="100" rx="10" fill="#94d2bd" filter="url(#shadow)"/>
                <text x="150" y="30" text-anchor="middle" font-size="22" font-weight="bold">Engineering</text>
                <text x="150" y="60" text-anchor="middle">- Architecture Reviews</text>
                <text x="150" y="80" text-anchor="middle">- Code Reviews</text>
            </g>
            <g transform="translate(850, 275)">
                <rect x="0" y="0" width="300" height="100" rx="10" fill="#94d2bd" filter="url(#shadow)"/>
                <text x="150" y="30" text-anchor="middle" font-size="22" font-weight="bold">Operations</text>
                <text x="150" y="60" text-anchor="middle">- Infrastructure Planning</text>
                <text x="150" y="80" text-anchor="middle">- Vendor Management</text>
            </g>
            <g transform="translate(450, 550)">
                <rect x="0" y="0" width="300" height="100" rx="10" fill="#94d2bd" filter="url(#shadow)"/>
                <text x="150" y="30" text-anchor="middle" font-size="22" font-weight="bold">Customer Support</text>
                <text x="150" y="60" text-anchor="middle">- Incident Communication</text>
                <text x="150" y="80" text-anchor="middle">- Escalation Procedures</text>
            </g>

            <!-- Arrows -->
            <line x1="600" y1="150" x2="600" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
            <line x1="350" y1="325" x2="450" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
            <line x1="750" y1="325" x2="850" y2="325" stroke="#333" stroke-width="2" marker-start="url(#arrow)"/>
            <line x1="600" y1="410" x2="600" y2="550" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
            
            <line x1="600" y1="160" x2="600" y2="150" stroke="#333" stroke-width="2" marker-start="url(#arrow)"/>
            <line x1="440" y1="325" x2="450" y2="325" stroke="#333" stroke-width="2" marker-start="url(#arrow)"/>
            <line x1="850" y1="325" x2="840" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
            <line x1="600" y1="540" x2="600" y2="550" stroke="#333" stroke-width="2" marker-start="url(#arrow)"/>

        </svg>
    </div>
</body>
</html>
