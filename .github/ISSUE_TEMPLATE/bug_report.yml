name: Bug Report
description: File a bug report to help us improve the SRE Masterclass environment.
title: "[Bug]: "
labels: ["bug", "triage-needed"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Which module are you on?
      multiple: false
      options:
        - Module 1 - Foundations
        - Module 2 - SLO/SLI
        - Module 3 - Advanced Monitoring
        - Module 4 - Incident Response
        - Module 5 - CI/CD
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: "How can we reproduce the issue? Please provide a step-by-step guide."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks."
      render: shell
